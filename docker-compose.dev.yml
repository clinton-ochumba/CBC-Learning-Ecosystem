version: '3.8'
# ─── LOCAL DEVELOPMENT ────────────────────────────────────────────────────────
# Usage:
#   cp backend/.env.example backend/.env   # fill in sandbox M-Pesa keys
#   docker compose -f docker-compose.dev.yml up
#
# Services: postgres:5432  redis:6379  backend:5000  frontend:3000
# Backend + frontend both hot-reload on file changes.

services:
  postgres:
    image: postgres:15-alpine
    container_name: cbc-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: cbc_learning_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: dev_password_123
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: cbc-redis-dev
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: builder          # Use build stage for dev tools (ts-node-dev)
    container_name: cbc-backend-dev
    restart: unless-stopped
    command: npm run dev
    environment:
      NODE_ENV: development
      PORT: 5000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: cbc_learning_dev
      DB_USER: postgres
      DB_PASSWORD: dev_password_123
      DB_SSL: "false"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      JWT_SECRET: dev_jwt_secret_minimum_64_chars_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
      JWT_REFRESH_SECRET: dev_refresh_secret_minimum_64_chars_xxxxxxxxxxxxxxxxxxxxxxxxxxx
      ENCRYPTION_KEY: dev_encryption_key_32chars_xxxxxxx
      API_BASE_URL: http://localhost:5000
      FRONTEND_URL: http://localhost:3000
      CORS_ORIGINS: http://localhost:3000
      MPESA_ENVIRONMENT: sandbox
      MPESA_CONSUMER_KEY: ${MPESA_CONSUMER_KEY:-sandbox_key}
      MPESA_CONSUMER_SECRET: ${MPESA_CONSUMER_SECRET:-sandbox_secret}
      MPESA_PASSKEY: ${MPESA_PASSKEY:-sandbox_passkey}
      MPESA_SHORTCODE: ${MPESA_SHORTCODE:-174379}
    ports:
      - "5000:5000"
    volumes:
      - ./backend/src:/app/src:ro   # Mount source for hot reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s        # Give migrations time to complete
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: builder
    container_name: cbc-frontend-dev
    restart: unless-stopped
    command: npm run dev -- --host 0.0.0.0
    environment:
      VITE_API_BASE_URL: http://localhost:5000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src:ro
    depends_on:
      - backend

volumes:
  postgres_dev:
